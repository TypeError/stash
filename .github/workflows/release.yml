name: 🚀 Release

on:
  workflow_dispatch:

env:
  NODE_VERSION: 24
  PNPM_VERSION: 11.9.0

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Verify main branch
        run: |
          if [[ "${{ github.ref_name }}" != "main" ]]; then
            echo "Release can only be done on the main branch."
            exit 1
          fi

      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm exec vp run build

      - name: Sign package
        working-directory: dist
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          if [[ -z "${PRIVATE_KEY}" ]]; then
            echo "Set an ed25519 key as PRIVATE_KEY in GitHub Actions secrets to sign."
            exit 1
          fi

          if [[ ! -f plugin_package.zip ]]; then
            echo "dist/plugin_package.zip was not found."
            exit 1
          fi

          umask 077
          printf '%s\n' "${PRIVATE_KEY}" > private_key.pem
          trap 'rm -f private_key.pem' EXIT

          openssl pkeyutl \
            -sign \
            -inkey private_key.pem \
            -out plugin_package.zip.sig \
            -rawin \
            -in plugin_package.zip

      - name: Check version
        id: meta
        working-directory: dist
        run: |
          VERSION=$(unzip -p plugin_package.zip manifest.json | jq -r .version)

          if [[ -z "${VERSION}" || "${VERSION}" == "null" ]]; then
            echo "Could not read version from manifest.json."
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: caido/action-release@v1
        with:
          tag: ${{ steps.meta.outputs.version }}
          commit: ${{ github.sha }}
          body: "Release ${{ steps.meta.outputs.version }}"
          artifacts: "dist/plugin_package.zip,dist/plugin_package.zip.sig"
          immutableCreate: true
